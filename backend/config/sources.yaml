# RSS 源清单
# use_proxy: true 表示走代理拉取（海外源）
# RSSHub 源使用 ${RSSHUB_BASE_URL} 占位符，运行时由环境变量替换
# 本地开发: RSSHUB_BASE_URL=http://localhost:1200
# 生产环境: RSSHUB_BASE_URL=http://rsshub:1200 (Docker 内部网络)

sources:
  # ── AI 与大模型 ──────────────────────────────────────────
  - key: 36kr
    name: 36氪
    url: https://36kr.com/feed
    use_proxy: false
    enabled: true

  - key: jiqizhixin
    name: 机器之心
    url: https://www.jiqizhixin.com/rss
    use_proxy: false
    enabled: true

  - key: leiphone
